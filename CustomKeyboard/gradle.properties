# Use AndroidX for compatibility
android.useAndroidX=true
# Enable Jetifier if using non-AndroidX libraries (good practice)
android.enableJetifier=true
# Increase JVM heap for daemon
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
# Disable configuration caching for max reliability on first init
org.gradle.configuration-cache=false
